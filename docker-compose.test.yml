services:
  db-test:
    image: postgres:16-alpine
    container_name: performs360-db-test
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: performs360_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata-test:
