name: Deploy to DigitalOcean

on:
  push:
    branches: [production]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  APP_DIR: /root/performs360
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_MIXPANEL_TOKEN=${{ secrets.NEXT_PUBLIC_MIXPANEL_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.APP_DIR }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            mkdir -p ${{ env.APP_DIR }}
            cd ${{ env.APP_DIR }}

            echo "--- Writing .env.production from secrets ---"
            cat > .env.production <<'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
            AUTH_TRUST_HOST=${{ secrets.AUTH_TRUST_HOST }}
            EMAIL_PROVIDER=${{ secrets.EMAIL_PROVIDER }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            EMAIL_FROM=${{ secrets.EMAIL_FROM }}
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}
            RECAPTCHA_SECRET_KEY=${{ secrets.RECAPTCHA_SECRET_KEY }}
            SUPER_ADMIN_EMAIL=${{ secrets.SUPER_ADMIN_EMAIL }}
            SUPER_ADMIN_NAME=${{ secrets.SUPER_ADMIN_NAME }}
            NEXT_PUBLIC_MIXPANEL_TOKEN=${{ secrets.NEXT_PUBLIC_MIXPANEL_TOKEN }}
            ENVEOF
            chmod 600 .env.production

            echo "--- Logging in to GHCR ---"
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            IMAGE="ghcr.io/${{ github.repository }}:latest"

            echo "--- Pulling pre-built image ---"
            docker pull "$IMAGE"

            echo "--- Tagging for local compose ---"
            docker tag "$IMAGE" performs360:latest

            echo "--- Replacing app container ---"
            docker compose --env-file .env.production up -d --no-deps app

            echo "--- Running database migrations ---"
            docker compose --env-file .env.production --profile migrate run --rm migrate

            echo "--- Replacing worker container ---"
            docker compose --env-file .env.production --profile worker up -d --no-deps worker

            echo "--- Cleaning up old images ---"
            docker image prune -f

            echo "--- Waiting for health check ---"
            sleep 10
            if docker compose --env-file .env.production ps app | grep -q "healthy"; then
              echo "Deployment successful"
            else
              echo "Warning: app not yet healthy, check logs with: docker compose logs app"
            fi
