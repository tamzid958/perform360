services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: perform360:latest
    container_name: perform360-app
    restart: unless-stopped
    init: true
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  worker:
    image: perform360:latest
    container_name: perform360-worker
    restart: unless-stopped
    init: true
    profiles: ["worker"]
    command: ["npm", "run", "worker"]
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true

  migrate:
    image: perform360:latest
    container_name: perform360-migrate
    profiles: ["migrate"]
    command: ["npx", "prisma", "migrate", "deploy"]
    restart: "no"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
